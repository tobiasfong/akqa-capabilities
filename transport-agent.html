<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transport | AKQA [agent]</title>
<style>
  :root {
    --font-mono: "Season Sans", sans-serif;
    --bg: #FAFAFA;
    --text: #1a1a1a;
    --muted: #666666;
    --border: #e0e0e0;
    --accent: #000000;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font-mono); font-size: 14px; line-height: 1.8;
    color: var(--text); background: var(--bg);
    -webkit-font-smoothing: antialiased;
  }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 40px; background: var(--bg);
    border-bottom: 1px solid var(--border);
  }
  .nav-logo {
    font-family: var(--font-mono); font-size: 14px; font-weight: 500;
    color: var(--text); text-decoration: none;
  }
  .nav-links { display: flex; gap: 8px; list-style: none; }
  .nav-links a {
    font-family: var(--font-mono); font-size: 13px; color: var(--muted);
    text-decoration: none; padding: 4px 12px;
    border: 1px solid var(--border); border-radius: 4px;
    transition: all 0.15s ease;
  }
  .nav-links a:hover { color: var(--text); border-color: var(--text); }

  /* TOGGLE */
  .mode-toggle { display: flex; gap: 16px; align-items: center; }
  .mode-toggle a {
    font-family: var(--font-mono); font-size: 13px;
    text-decoration: none; color: var(--muted);
    display: flex; align-items: center; gap: 6px;
  }
  .mode-toggle a.active { color: var(--text); font-weight: 500; }
  .mode-dot {
    width: 8px; height: 8px; border-radius: 50%;
    border: 1.5px solid currentColor; display: inline-block;
  }
  .mode-toggle a.active .mode-dot { background: currentColor; }

  /* CONTENT */
  .content {
    max-width: 720px; margin: 0 auto;
    padding: 100px 40px 80px;
  }
  h1 {
    font-family: var(--font-mono); font-size: 14px; font-weight: 500;
    color: var(--text); margin-bottom: 24px;
  }
  h1::before { content: '# '; color: var(--muted); }
  h2 {
    font-family: var(--font-mono); font-size: 14px; font-weight: 500;
    color: var(--text); margin-top: 48px; margin-bottom: 16px;
  }
  h2::before { content: '## '; color: var(--muted); }
  h3 {
    font-family: var(--font-mono); font-size: 14px; font-weight: 500;
    color: var(--text); margin-top: 32px; margin-bottom: 8px;
    text-transform: uppercase; letter-spacing: 0.02em;
  }
  h3::before { content: '### '; color: var(--muted); }
  p {
    font-family: var(--font-mono); font-size: 14px;
    color: var(--muted); line-height: 1.8; margin-bottom: 16px;
  }
  hr {
    border: none; border-top: 1px solid var(--border);
    margin: 48px 0;
  }
  .entry {
    margin-bottom: 8px; padding-left: 16px;
    border-left: 2px solid var(--border);
  }
  .entry-desc {
    color: var(--muted); font-size: 13px;
  }
  .tag {
    display: inline-block; font-size: 11px; color: var(--muted);
    border: 1px solid var(--border); padding: 1px 8px; border-radius: 3px;
    margin-right: 8px; margin-bottom: 4px;
  }
  .stat-row {
    display: flex; gap: 32px; margin: 16px 0 8px; flex-wrap: wrap;
  }
  .stat-item { font-size: 13px; }
  .stat-val { font-weight: 500; color: var(--text); }
  .stat-label { color: var(--muted); }

  /* FOOTER */
  footer {
    max-width: 720px; margin: 0 auto; padding: 40px 40px;
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .footer-logo { font-size: 14px; font-weight: 500; color: var(--text); text-decoration: none; }
  .footer-text { font-size: 12px; color: var(--muted); }

  @media (max-width: 640px) {
    nav { padding: 12px 20px; }
    .nav-links { display: none; }
    .content { padding: 80px 20px 60px; }
  }
  .nav-logo, .footer-logo { display: inline-flex; align-items: center; gap: 8px; }
  .akqa-logo { display: block; width: 86px; height: auto; }
  .footer-logo .akqa-logo { width: 78px; }
        /* Season font system */
        @font-face {
            font-family: "Season Mix";
            src: url("SeasonMix-Regular.otf") format("opentype");
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: "Season Sans";
            src: url("SeasonSans-Regular.otf") format("opentype");
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: "Season Serif";
            src: url("SeasonSerif-Regular.otf") format("opentype");
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        :root {
            --font-heading: "Season Mix", serif;
            --font-ui: "Season Sans", sans-serif;
            --font-mono: "Season Sans", sans-serif;
        }

        body,
        p,
        li,
        .hero p,
        .subtitle,
        .product-desc,
        .narrative-body,
        .narrative-body p,
        .step-desc,
        .case-desc,
        .entry-desc,
        .comp-desc,
        .output-desc,
        .decision-text,
        .footer-text {
            font-family: "Season Sans", sans-serif;
            text-transform: none;
        }

        h1,
        h2,
        .hero-title,
        .header-title {
            font-family: "Season Mix", serif;
            text-transform: uppercase;
        }

        h3,
        h4,
        .product-name,
        .industry-title,
        .narrative-title,
        .step-title,
        .case-title,
        .use-case-title,
        .cta-title,
        .tech-item,
        .client-logo,
        .entry h3,
        .comp-title,
        .output-title,
        .decision-label {
            font-family: "Season Sans", sans-serif;
            text-transform: none;
        }

        .section-header,
        .product-tag,
        .hero-breadcrumb,
        .narrative-label,
        .steps-label,
        .step-number,
        .case-client,
        .case-stat-label,
        .tech-group-title,
        .stat-label,
        .impact-label-text,
        .tag,
        .mode-toggle a,
        .nav-links a,
        .label {
            font-family: "Season Serif", serif;
            text-transform: none;
        }

    </style>
</head>
